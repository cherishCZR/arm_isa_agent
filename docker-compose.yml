version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: arm-isa-backend
    ports:
      - "8000:8000"
    environment:
      - ARM_ISA_DATA_DIR=/app/data
      - ARM_ISA_API_PORT=8000
      - ARM_ISA_LLM_MODEL=gpt-4o-mini
    volumes:
      - ./data:/app/data
      - sqlite_data:/app/data/sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: arm-isa-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
